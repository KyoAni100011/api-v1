default: &default
  adapter: mysql2
  encoding: utf8mb4
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: root
  password: 123123
  host: 172.20.0.1
  socket: /var/run/mysqld/mysqld.sock

development:
  <<: *default
  database: dev

test:
  <<: *default
  database: test

production:
  primary: &primary_production
    <<: *default
    database: api_v1_production
    username: api_v1
    password: <%= ENV["API_V1_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: api_v1_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: api_v1_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: api_v1_production_cable
    migrations_paths: db/cable_migrate
