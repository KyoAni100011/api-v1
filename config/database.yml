default: &default
  adapter: mysql2
  encoding: utf8mb4
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  port: 3306

development:
  <<: *default
  database: dev
  username: root
  password: 123123
  host: 172.20.0.1

test:
  <<: *default
  database: test
  username: root
  password: 123123
  host: 172.20.0.1

production:
  <<: *default
  database: <%= ENV["DB_NAME"] %>
  username: <%= ENV["DB_USER"] %>
  password: <%= ENV["DB_PASSWORD"] %>
  host: <%= ENV["DB_HOST"] %>
